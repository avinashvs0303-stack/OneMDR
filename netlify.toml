# Netlify — OneMDR Platform (by Clarbit)
# Monorepo: apps/frontend (Next.js 15, pnpm workspaces)

[build]
  command = "pnpm install --frozen-lockfile && pnpm --filter @onemdr/frontend build"
  publish = "apps/frontend/.next"

[build.environment]
  NODE_VERSION            = "20"
  PNPM_VERSION            = "9"
  NEXT_TELEMETRY_DISABLED = "1"

[context.deploy-preview.environment]
  NEXT_PUBLIC_DEV_BYPASS_AUTH = "true"

[context.branch-deploy.environment]
  NEXT_PUBLIC_DEV_BYPASS_AUTH = "true"

[context.production.environment]
  NEXT_PUBLIC_DEV_BYPASS_AUTH = "false"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/media/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
